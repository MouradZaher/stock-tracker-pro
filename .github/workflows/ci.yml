# Verifies the app builds on every push to main.
# If Vercel Git integration is not deploying, add a Deploy Hook in the Vercel project
# (Settings → Git → Deploy Hooks), then add it as repo secret VERCEL_DEPLOY_HOOK.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Trigger Vercel production deploy (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then curl -fsS -X POST "$HOOK"; else echo "Set repo secret VERCEL_DEPLOY_HOOK to ping Vercel after each push."; fi
